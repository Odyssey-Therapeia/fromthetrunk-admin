name: Enforce PR-Only Promotion

on:
  push:
    branches:
      - development
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  require-pr-associated-commit:
    name: Require PR-associated commit
    runs-on: ubuntu-latest
    steps:
      - name: Ensure pushed commit came through a pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;
            const targetBranch = context.ref.replace("refs/heads/", "");

            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha,
            });

            if (!result.data || result.data.length === 0) {
              core.setFailed(
                `Direct push detected on '${targetBranch}'. ` +
                "Promotions must come from pull requests only: sprint-abe -> development -> main."
              );
              return;
            }

            const prNumbers = result.data.map((pr) => `#${pr.number}`).join(", ");
            core.notice(`Commit ${commitSha} is associated with ${prNumbers}. Policy check passed.`);
